<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Poll | Patalympics</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header" aria-label="Hauptnavigation">
      <a class="brand" href="index.html" aria-label="Patalympics Startseite">
        <span class="brand-mark">P</span>
        <span>Patalympics</span>
      </a>

      <nav class="main-nav" aria-label="Seiten">
        <a href="news.html">News</a>
        <a href="kalender.html">Kalender</a>
        <a href="rangliste.html">Rangliste</a>
        <a class="active" href="poll.html">Poll</a>
        <a href="hall-of-fame.html">Hall of Fame</a>
      </nav>
    </header>

    <main class="page-shell content-page">
      <div class="page-shade"></div>
      <section class="poll-board" aria-label="Abstimmungen">
        <p id="poll-empty" class="empty-state poll-empty">Aktuell sind keine Abstimmungen freigegeben.</p>

        <section id="availability-poll" class="content-panel simple-poll" hidden>
          <div class="section-head">
            <h1>Verfügbarkeit</h1>
          </div>
          <p id="availability-info" class="poll-copy" hidden></p>
          <form id="availability-form" class="poll-answer-form">
            <label class="field">
              <span>Name</span>
              <input id="availability-name" name="participant" type="text" required />
            </label>
            <div class="availability-scroll">
              <div id="availability-options" class="availability-matrix"></div>
            </div>
            <label class="field">
              <span>Info</span>
              <textarea id="availability-note" name="note" rows="3"></textarea>
            </label>
            <button class="form-button" type="submit">Speichern</button>
            <p id="availability-status" class="form-status" role="status"></p>
          </form>
        </section>

        <section id="suggestion-poll" class="content-panel simple-poll" hidden>
          <div class="section-head">
            <h1>Game Vorschläge</h1>
          </div>
          <p id="suggestion-info" class="poll-copy" hidden></p>
          <form id="suggestion-form" class="poll-answer-form">
            <label class="field">
              <span>Name</span>
              <input id="suggestion-name" name="participant" type="text" required />
            </label>
            <label class="field">
              <span>Deine Spiele</span>
              <textarea id="suggestion-games" name="games" rows="4" required></textarea>
            </label>
            <button class="form-button" type="submit">Vorschlagen</button>
            <p id="suggestion-status" class="form-status" role="status"></p>
          </form>
        </section>

        <section id="game-vote-poll" class="content-panel simple-poll" hidden>
          <div class="section-head">
            <h1>Game Voting</h1>
          </div>
          <p id="game-vote-info" class="poll-copy" hidden></p>
          <form id="game-vote-form" class="poll-answer-form">
            <label class="field">
              <span>Name</span>
              <input id="game-vote-name" name="participant" type="text" required />
            </label>
            <div id="game-vote-options" class="vote-options"></div>
            <button class="form-button" type="submit">Abstimmen</button>
            <p id="game-vote-status" class="form-status" role="status"></p>
          </form>
        </section>
      </section>
    </main>
    <script src="supabase-config.js"></script>
    <script src="site.js"></script>
  </body>
</html>
